<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hokkaido 2026 - Master Stable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { 'sakura-rose': '#D81B60', 'sakura-pink': '#FFD1DC', 'nav-blue': '#4FC3F7' } } } }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        [v-cloak] { display: none !important; }
        body { background-color: #FFF9FA; font-family: 'Noto Sans TC', sans-serif; color: #4A4A4A; margin: 0; touch-action: manipulation; }
        .app-container { max-width: 480px; margin: 0 auto; min-height: 100vh; background: white; position: relative; padding-bottom: 90px; box-shadow: 0 0 30px rgba(0,0,0,0.05); }
        .header-bg { background-color: #ffffff; border-bottom-left-radius: 35px; border-bottom-right-radius: 35px; overflow: hidden; position: relative; box-shadow: 0 4px 15px rgba(216, 27, 96, 0.1); }
        .header-image { width: 100%; height: 250px; object-fit: cover; }
        .tab-button { width: 42px; height: 42px; border-radius: 50%; background: white; color: #FFB7C5; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(216, 27, 96, 0.15); transition: 0.3s; cursor: pointer; border: none; }
        .tab-button.active { background-color: #D81B60; color: white; transform: scale(1.1); }
        .nav-btn { width: 34px; height: 34px; background-color: #4FC3F7; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; shadow: 0 4px 10px rgba(79, 195, 247, 0.3); flex-shrink: 0; cursor: pointer; }
        .sync-btn { position: fixed; top: 16px; right: 16px; z-index: 300; width: 44px; height: 44px; background: #00C853; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; box-shadow: 0 4px 15px rgba(0, 200, 83, 0.4); border: 2px solid white; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .export-btn { position: absolute; top: 16px; left: 16px; z-index: 40; background: rgba(255,255,255,0.9); padding: 8px 12px; border-radius: 12px; font-size: 11px; font-weight: bold; color: #D81B60; box-shadow: 0 2px 8px rgba(0,0,0,0.1); border: 1px solid #FFD1DC; }
    </style>
</head>
<body>

<div id="app" v-cloak class="app-container">
    <div v-if="!user && !isGuest" class="fixed inset-0 bg-[#FFF9FA] z-[1000] flex flex-col items-center justify-center p-6 text-center">
        <div class="bg-white p-6 rounded-[40px] shadow-2xl w-full max-w-sm">
            <h2 class="text-3xl font-black text-sakura-rose mb-6 italic">Hokkaido 2026</h2>
            <button @click="login" class="w-full border-2 border-slate-100 py-4 rounded-2xl font-bold active:scale-95 mb-4 flex items-center justify-center">Google 雲端同步模式</button>
            <button @click="isGuest = true" class="w-full bg-slate-50 py-4 rounded-2xl font-bold text-slate-500">訪客直接查看</button>
        </div>
    </div>

    <div v-if="(user || isGuest)">
        <button v-if="user" @click="forceSync" class="sync-btn" :class="{'animate-spin': isSyncing}"><i class="fa-solid fa-cloud-arrow-up"></i></button>

        <div class="header-bg relative">
            <button @click="exportNewHtml" class="export-btn">匯出互動網頁</button>
            <img src="1769184532571.png" class="header-image">
            <div class="absolute bottom-6 right-4 z-30 flex gap-2">
                <button v-for="t in tabs" :key="t.id" @click="currentTab = t.id" :class="{'active': currentTab === t.id}" class="tab-button shadow-md"><i :class="t.icon"></i></button>
            </div>
        </div>

        <main class="p-4 pt-8">
            <div v-if="currentTab === 'itinerary'" class="space-y-4 animate-fade-in">
                <div v-for="(item, index) in currentItinerary" :key="item.id" class="bg-white rounded-[32px] p-5 shadow-sm border border-pink-50 relative mb-4">
                    <div class="flex items-start">
                        <div class="mr-4 flex flex-col items-center"><div class="p-3 rounded-full bg-pink-50 text-sakura-rose"><i :class="getCategoryIcon(item.category)"></i></div><span class="text-[10px] text-slate-300 mt-2">{{ item.startTime }}</span></div>
                        <div class="flex-1">
                            <h3 class="font-bold text-slate-800 leading-tight">{{ item.name }}</h3>
                            <div v-if="item.note" class="mt-2 bg-slate-50 p-3 rounded-xl text-xs text-slate-600 whitespace-pre-line">{{ item.note }}</div>
                        </div>
                        <button @click="openMap(item.address || item.name)" class="nav-btn ml-2"><i class="fa-solid fa-location-arrow text-xs"></i></button>
                    </div>
                </div>
            </div>

            <div v-if="currentTab === 'shopping'" class="grid grid-cols-2 gap-4 animate-fade-in">
                <div v-for="(item, idx) in shoppingList" :key="idx" class="bg-white rounded-2xl p-3 shadow-sm border relative text-center">
                    <div class="aspect-square bg-slate-50 rounded-xl mb-2 overflow-hidden relative">
                        <img v-if="item.image" :src="item.image" class="w-full h-full object-cover">
                        <i v-else class="fa-solid fa-bag-shopping text-slate-200 text-3xl"></i>
                        <div v-if="user" class="absolute top-2 right-2 flex flex-col gap-1">
                            <button @click.stop="removeShoppingItem(idx)" class="bg-black/60 text-white rounded-full w-6 h-6 flex items-center justify-center text-[10px]"><i class="fa-solid fa-xmark"></i></button>
                            <button @click.stop="openEditShoppingModal(item, idx)" class="bg-white text-slate-600 rounded-full w-6 h-6 flex items-center justify-center text-[10px] shadow-sm"><i class="fa-solid fa-pencil"></i></button>
                        </div>
                    </div>
                    <p class="font-bold text-sm text-slate-800 truncate px-1">{{ item.name }}</p>
                </div>
            </div>
            
            <div v-if="currentTab === 'expenses'" class="animate-fade-in text-center">
                <div class="bg-gradient-to-br from-[#01579B] to-[#0097A7] rounded-[32px] p-8 text-white shadow-xl mb-6">
                    <p class="text-sm opacity-80 mb-2 font-bold">目前總花費 (JPY)</p>
                    <h2 class="text-5xl font-black">¥ {{ formatNumber(totalJPY) }}</h2>
                    <p class="text-sm text-right opacity-80 mt-2 font-bold">約 NT$ {{ formatNumber(totalTWD) }}</p>
                </div>
                <div v-for="(exp, idx) in expenses" :key="idx" class="flex items-center justify-between p-4 bg-white rounded-2xl mb-2 text-left shadow-sm border-b">
                    <div class="flex items-center"><div class="w-10 h-10 rounded-full bg-pink-50 text-sakura-rose flex items-center justify-center mr-3 font-bold text-[10px]">{{ exp.category }}</div><div><p class="font-bold text-slate-700 text-sm leading-tight">{{ exp.name }}</p><p class="text-[10px] text-slate-400 mt-0.5 font-bold">{{ exp.date }}</p></div></div>
                    <div v-if="user" class="flex items-center"><p class="font-bold text-slate-700">¥{{ formatNumber(exp.amount) }}</p><button @click="removeExpense(idx)" class="ml-3 text-red-200"><i class="fa-solid fa-xmark text-lg"></i></button></div>
                </div>
            </div>
        </main>
    </div>

    <button v-if="user" @click="handleAddClick" class="fixed bottom-8 right-8 w-14 h-14 bg-[#FFD54F] rounded-full shadow-lg text-[#01579B] text-2xl flex items-center justify-center z-40 active:scale-90 border-2 border-white"><i class="fa-solid fa-plus"></i></button>
</div>

<script type="module">
    const supabaseUrl = 'https://snikmtptzjnlqgpvobph.supabase.co'; 
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNuaWttdHB0empubHFncHZvYnBoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk0NjY2OTEsImV4cCI6MjA4NTA0MjY5MX0.BGHztxKN7nlU9nIeEohiVDThfjXvZGEMy6xmeUwOrWE'; 
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
    const { createApp, ref, computed, onMounted, watch } = Vue;

    createApp({
        setup() {
            const currentTab = ref('itinerary');
            const user = ref(null); const isGuest = ref(false); const isSyncing = ref(false);
            const selectedDateIndex = ref(0); const jpyInput = ref(50000);
            const itineraryData = ref(Array.from({ length: 7 }, () => []));
            const shoppingList = ref([]); const expenses = ref([]); const mustVisitList = ref([]);
            const hotels = ref([]); // 初始化避免空值導致 computed 報錯
            
            const tabs = [
                { id: 'itinerary', icon: 'fa-solid fa-map-location-dot' },
                { id: 'info', icon: 'fa-solid fa-circle-info' },
                { id: 'mustvisit', icon: 'fa-solid fa-store' },
                { id: 'shopping', icon: 'fa-solid fa-basket-shopping' },
                { id: 'expenses', icon: 'fa-solid fa-coins' }
            ];

            const dates = ref([{ date: '5/6', weekday: 'WED' }, { date: '5/7', weekday: 'THU' }, { date: '5/8', weekday: 'FRI' }, { date: '5/9', weekday: 'SAT' }, { date: '5/10', weekday: 'SUN' }, { date: '5/11', weekday: 'MON' }, { date: '5/12', weekday: 'TUE' }]);

            // 強大的錯誤修復與存檔機制
            onMounted(async () => {
                try {
                    // 1. 優先讀取雲端/本地快取
                    const saved = localStorage.getItem('sakura_master_v10');
                    if (saved) {
                        const data = JSON.parse(saved);
                        itineraryData.value = data.i || itineraryData.value;
                        shoppingList.value = data.s || [];
                        expenses.value = data.e || [];
                        mustVisitList.value = data.m || [];
                    }
                    // 2. 獲取使用者登入狀態
                    const { data: { session } } = await supabase.auth.getSession();
                    if (session) user.value = session.user;
                } catch (err) { console.error("啟動失敗", err); }
            });

            // 自動存檔監聽
            watch([itineraryData, expenses, shoppingList, mustVisitList], () => {
                localStorage.setItem('sakura_master_v10', JSON.stringify({
                    i: itineraryData.value, s: shoppingList.value, e: expenses.value, m: mustVisitList.value
                }));
            }, { deep: true });

            const exportNewHtml = () => {
                const html = document.documentElement.outerHTML;
                const dbJson = JSON.stringify({ i: itineraryData.value, e: expenses.value, s: shoppingList.value, m: mustVisitList.value }).replace(/'/g, "\\'");
                const blob = new Blob([html.replace('</body>', `<script>localStorage.setItem('sakura_master_v10', '${dbJson}');<\/script></body>`)], { type: 'text/html' });
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'hokkaido_v10.html'; a.click();
            };

            return { 
                user, isGuest, currentTab, tabs, dates, selectedDateIndex, itineraryData, shoppingList, expenses, mustVisitList,
                jpyInput, isSyncing, totalJPY: computed(()=>expenses.value.reduce((s,e)=>s+(Number(e.amount)||0),0)),
                totalTWD: computed(()=>Math.round(expenses.value.reduce((s,e)=>s+(Number(e.amount)||0),0)*0.215)),
                login: () => supabase.auth.signInWithOAuth({ provider: 'google' }),
                openMap: (q) => window.open('https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(q), '_blank'),
                formatNumber: (n) => n?.toLocaleString() || '0',
                getCategoryIcon: (cat) => ({ sightseeing: 'fa-solid fa-camera', flight: 'fa-solid fa-plane', food: 'fa-solid fa-utensils', accommodation: 'fa-solid fa-bed', transport: 'fa-solid fa-bus' }[cat] || 'fa-solid fa-star'),
                getTransportIcon: (type) => ({ walk: 'fa-solid fa-person-walking', car: 'fa-solid fa-car-side', bus: 'fa-solid fa-bus-simple', public: 'fa-solid fa-train-subway', flight: 'fa-solid fa-plane-up' }[type] || 'fa-solid fa-arrow-down'),
                exportNewHtml, currentItinerary: computed(() => itineraryData.value[selectedDateIndex.value] || []),
                // 新增記帳、購物修改邏輯與其他方法...
            };
        }
    }).mount('#app');
</script>
</body>
</html>
