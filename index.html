<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hokkaido 2026 - Final Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { 'sakura-rose': '#D81B60', 'sakura-pink': '#FFD1DC', 'nav-blue': '#4FC3F7' } } } }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        [v-cloak] { display: none !important; }
        body { background-color: #FFF9FA; font-family: 'Noto Sans TC', sans-serif; color: #4A4A4A; margin: 0; touch-action: manipulation; }
        .app-container { max-width: 480px; margin: 0 auto; min-height: 100vh; background: white; position: relative; padding-bottom: 90px; box-shadow: 0 0 30px rgba(0,0,0,0.05); }
        .header-bg { background-color: #ffffff; border-bottom-left-radius: 35px; border-bottom-right-radius: 35px; overflow: hidden; position: relative; box-shadow: 0 4px 15px rgba(216, 27, 96, 0.1); }
        .header-image { width: 100%; height: 250px; object-fit: cover; }
        .tab-button { width: 42px; height: 42px; border-radius: 50%; background: white; color: #FFB7C5; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(216, 27, 96, 0.15); transition: 0.3s; cursor: pointer; border: none; }
        .tab-button.active { background-color: #D81B60; color: white; transform: scale(1.1); }
        .nav-btn { width: 34px; height: 34px; background-color: #4FC3F7; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; shadow: 0 4px 10px rgba(79, 195, 247, 0.3); flex-shrink: 0; cursor: pointer; }
        .sync-btn { position: fixed; top: 16px; right: 16px; z-index: 300; width: 44px; height: 44px; background: #00C853; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; box-shadow: 0 4px 15px rgba(0, 200, 83, 0.4); border: 2px solid white; cursor: pointer; }
        .photo-viewer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .full-photo { max-width: 100%; max-height: 90vh; border-radius: 10px; transition: transform 0.1s; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="app" v-cloak class="app-container">
    <div v-if="!user && !isGuest" class="fixed inset-0 bg-[#FFF9FA] z-[1000] flex flex-col items-center justify-center p-6 text-center text-left">
        <div class="bg-white p-6 rounded-[40px] shadow-2xl w-full max-w-sm">
            <h2 class="text-3xl font-black text-sakura-rose mb-6 italic">Hokkaido 2026</h2>
            <button @click="login" class="w-full border-2 border-slate-100 py-4 rounded-2xl font-bold active:scale-95 mb-4 shadow-sm flex items-center justify-center"><img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" class="w-6 h-6 mr-3"> Google 雲端同步模式</button>
            <button @click="isGuest = true" class="w-full bg-slate-50 py-4 rounded-2xl font-bold text-slate-500 border border-slate-100">訪客直接查看</button>
        </div>
    </div>

    <div v-if="user || isGuest">
        <button v-if="user" @click="forceSync" class="sync-btn" :class="{'animate-spin pointer-events-none opacity-50': isSyncing}"><i class="fa-solid fa-cloud-arrow-up"></i></button>

        <div class="header-bg relative">
            <div class="absolute top-4 right-4 z-[100]"><button v-if="user" @click="logout" class="bg-black/30 text-white p-2 px-4 rounded-full text-[10px] backdrop-blur-md">登出</button></div>
            <img src="1769184532571.png" class="header-image">
            <div class="absolute bottom-6 right-4 z-30 flex gap-2">
                <button v-for="t in tabs" :key="t.id" @click="currentTab = t.id" :class="{'active': currentTab === t.id}" class="tab-button shadow-md"><i :class="t.icon"></i></button>
            </div>
        </div>

        <main class="p-4 pt-8">
            <div v-if="currentTab === 'itinerary'" class="space-y-4 animate-fade-in text-left">
                <div class="flex overflow-x-auto hide-scrollbar space-x-3 pb-4 sticky top-0 bg-white/90 backdrop-blur-md -mx-4 px-4 z-20 text-center">
                    <div v-for="(day, idx) in dates" :key="idx" @click="selectedDateIndex = idx" class="flex-shrink-0 w-[58px] h-[68px] rounded-xl flex flex-col items-center justify-center border-2 transition-all cursor-pointer" :class="selectedDateIndex === idx ? 'bg-sakura-rose text-white border-sakura-rose shadow-md' : 'bg-white text-pink-300 border-pink-50'"><span class="text-sm font-bold uppercase">{{ day.weekday }}</span><span class="text-xs">{{ day.date }}</span></div>
                </div>
                <div v-for="(item, index) in currentItinerary" :key="item.id" class="bg-white rounded-[32px] p-5 shadow-sm border border-pink-50 mb-4 relative">
                    <div class="flex items-start">
                        <div class="mr-4 flex flex-col items-center min-w-[50px]"><div class="p-3 rounded-full bg-pink-50 text-sakura-rose shadow-inner"><i :class="getCategoryIcon(item.category)"></i></div><span class="text-[10px] font-bold text-slate-300 mt-2 text-center">{{ item.startTime }}</span></div>
                        <div class="flex-1">
                            <h3 class="font-bold text-slate-800 leading-tight text-lg">{{ item.name }}</h3>
                            <div v-if="item.price" class="mt-1 text-[11px] text-blue-500 font-bold flex items-center font-bold"><i class="fa-solid fa-ticket mr-1.5"></i>費用：{{ item.price }}</div>
                            <div v-if="item.note" class="mt-2 text-[11px] text-sakura-rose font-bold whitespace-pre-line leading-relaxed">{{ item.note }}</div>
                            <div v-if="item.description" class="mt-2 text-[11px] text-slate-400 border-t pt-2 whitespace-pre-line leading-relaxed">{{ item.description }}</div>
                        </div>
                        <button @click="openMap(item.address || item.name)" class="nav-btn ml-2"><i class="fa-solid fa-location-arrow text-xs"></i></button>
                    </div>
                </div>
            </div>

            <div v-if="currentTab === 'shopping'" class="grid grid-cols-2 gap-4 animate-fade-in">
                <div v-for="(item, idx) in shoppingList" :key="idx" class="bg-white rounded-2xl p-3 shadow-sm border relative text-center">
                    <div class="aspect-square bg-slate-50 rounded-xl mb-2 overflow-hidden relative" @click="openGallery([item.image])">
                        <img v-if="item.image" :src="item.image" class="w-full h-full object-cover">
                        <i v-else class="fa-solid fa-bag-shopping text-slate-200 text-3xl"></i>
                        <div v-if="user" class="absolute top-2 right-2 flex flex-col gap-1">
                            <button @click.stop="removeShoppingItem(idx)" class="bg-black/60 text-white rounded-full w-6 h-6 flex items-center justify-center text-[10px] shadow-md"><i class="fa-solid fa-xmark"></i></button>
                            <button @click.stop="openEditShoppingModal(item, idx)" class="bg-white text-slate-600 rounded-full w-6 h-6 flex items-center justify-center text-[10px] shadow-md"><i class="fa-solid fa-pencil"></i></button>
                        </div>
                    </div>
                    <p class="font-bold text-sm text-slate-800 truncate px-1">{{ item.name }}</p>
                </div>
            </div>
            
            </main>
    </div>

    <div v-if="showShoppingModal" class="fixed inset-0 z-[1100] flex items-center justify-center p-6 bg-black/40 backdrop-blur-sm animate-fade-in">
        <div class="bg-white rounded-[40px] w-full max-w-sm p-8 text-center shadow-2xl">
            <h3>{{ isEditShopping ? '✏️ 編輯購物' : '🛍️ 新增購物' }}</h3>
            <div class="space-y-4">
                <input v-model="newShoppingItem.name" type="text" placeholder="品名" class="w-full bg-slate-50 p-4 rounded-xl text-center font-bold outline-none">
                <div @click="triggerFileInput" class="border-2 border-dashed rounded-xl p-10 cursor-pointer relative">
                    <div v-if="isProcessingImage" class="absolute inset-0 flex items-center justify-center bg-white/80"><i class="fa-solid fa-spinner animate-spin text-nav-blue"></i></div>
                    <input type="file" ref="fileInput" class="hidden" @change="handleImageUpload">
                    <img v-if="newShoppingItem.image" :src="newShoppingItem.image" class="w-full h-32 object-contain">
                    <i v-else class="fa-solid fa-camera text-4xl text-slate-300"></i>
                </div>
            </div>
            <div class="flex space-x-3 mt-8">
                <button @click="showShoppingModal = false" class="flex-1 py-4 bg-slate-100 rounded-2xl font-bold">取消</button>
                <button @click="saveShoppingItem" class="flex-1 py-4 bg-nav-blue text-white rounded-2xl font-bold shadow-lg">儲存</button>
            </div>
        </div>
    </div>

    <button v-if="user" @click="handleAddClick" class="fixed bottom-8 right-8 w-14 h-14 bg-[#FFD54F] rounded-full shadow-lg text-[#01579B] text-2xl flex items-center justify-center z-40 active:scale-90 border-2 border-white"><i class="fa-solid fa-plus"></i></button>
    <div v-if="galleryList.length > 0" class="photo-viewer-overlay" @click="galleryList = []"><img :src="galleryList[galleryIndex]" class="full-photo"></div>
</div>

<script type="module">
    const supabaseUrl = 'https://snikmtptzjnlqgpvobph.supabase.co'; 
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNuaWttdHB0empubHFncHZvYnBoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk0NjY2OTEsImV4cCI6MjA4NTA0MjY5MX0.BGHztxKN7nlU9nIeEohiVDThfjXvZGEMy6xmeUwOrWE'; 
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
    const { createApp, ref, computed, onMounted, watch } = Vue;

    createApp({
        setup() {
            const currentTab = ref('itinerary');
            const user = ref(null); const isGuest = ref(false); const isSyncing = ref(false); const isProcessingImage = ref(false);
            const selectedDateIndex = ref(0); const jpyInput = ref(50000); const galleryList = ref([]); const galleryIndex = ref(0);
            const shoppingList = ref([]); const expenses = ref([]); const mustVisitList = ref([]);

            // 🌸 數據恢復：Day 1-7 詳細資訊
            const itineraryData = ref([
                [ { id: 101, name: '桃園機場報到', startTime: '10:00', category: 'flight', note: '中華航空 CI0130 12:00 起飛' }, { id: 102, name: '抵達函館', startTime: '16:45', note: '辦理入境與領取行李' }, { id: 105, name: '晚餐：幸運小丑漢堡', startTime: '19:30', note: '必吃雞腿漢堡' } ],
                [ { id: 200, name: '五稜郭公園', startTime: '08:30', price: '¥1,080', note: '賞櫻星型要塞' }, { id: 203, name: '函館山夜景', startTime: '17:30', price: '纜車 ¥1,800' } ],
                [ { id: 304, name: '洞爺湖萬世閣飯店', startTime: '10:13', address: '北海道洞爺湖温泉21', note: '辦手續放行李' } ],
                [ { id: 406, name: '登別巡禮', startTime: '14:00', description: '地獄谷 → 大湯沼 → 天然足湯 → 閻魔堂' } ],
                [ { id: 502, name: '尼克斯海洋公園', startTime: '09:30', note: '10:00 海豚 / 企鵝遊行' }, { id: 505, name: '札幌王⼦⼤飯店', startTime: '15:30', note: '入住飯店' } ],
                [ { id: 601, name: '前往小樽', startTime: '07:30', note: '接駁車 7:30 啟程' }, { id: 605, name: '藻岩山夜景', startTime: '16:00', price: '¥2,460' } ],
                [ { id: 702, name: '新千歲 → 桃園', startTime: '16:25', category: 'flight', note: 'CI0131 返台' } ]
            ]);

            const hotels = ref([{ name: 'JRイン函館', date: '5/6 - 5/8', address: '〒040-0063 北海道函館市若松町12-14' }, { name: '札幌王⼦⼤飯店', date: '5/10 - 5/12', address: '〒060-0002 北海道札幌市中央区西11丁目' }]);

            // ✨ 強力壓縮邏輯：縮小長邊並降低品質，確保雲端秒傳
            const compressImage = (file) => {
                return new Promise((resolve) => {
                    const reader = new FileReader(); reader.readAsDataURL(file);
                    reader.onload = (e) => {
                        const img = new Image(); img.src = e.target.result;
                        img.onload = () => {
                            const canvas = document.createElement('canvas'); 
                            let width = img.width, height = img.height; 
                            const max = 500; // 壓縮至 500px 以利多筆資料傳輸
                            if (width > height) { if (width > max) { height *= max / width; width = max; } } else { if (height > max) { width *= max / height; height = max; } }
                            canvas.width = width; canvas.height = height;
                            canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                            resolve(canvas.toDataURL('image/jpeg', 0.4)); // 品質調至 0.4
                        };
                    };
                });
            };

            onMounted(async () => {
                const saved = localStorage.getItem('sakura_v22_stable');
                if (saved) {
                    const data = JSON.parse(saved);
                    if (data.i) itineraryData.value = data.i;
                    shoppingList.value = data.s || []; expenses.value = data.e || []; mustVisitList.value = data.m || [];
                }
                const { data: { session } } = await supabase.auth.getSession();
                if (session) { user.value = session.user; if (shoppingList.value.length === 0) await loadCloudData(session.user.id); }
            });

            const loadCloudData = async (userId) => {
                const { data } = await supabase.from('user_data').select('*').eq('id', userId).single();
                if (data) { shoppingList.value = data.shopping || []; expenses.value = data.expenses || []; mustVisitList.value = data.must_visit || []; }
            };

            // ✨ 強化版同步邏輯：加入強迫停止旋轉
            const forceSync = async () => {
                if (!user.value || isSyncing.value) return;
                isSyncing.value = true;
                try { 
                    const { error } = await supabase.from('user_data').upsert({ 
                        id: user.value.id, 
                        expenses: JSON.parse(JSON.stringify(expenses.value)), 
                        shopping: JSON.parse(JSON.stringify(shoppingList.value)), 
                        must_visit: JSON.parse(JSON.stringify(mustVisitList.value)), 
                        last_update: new Date() 
                    }); 
                    if (error) throw error;
                    alert("✅ 4/23 同步成功！"); 
                } catch (e) { 
                    alert("❌ 同步失敗：" + e.message + "\n(請確認 Supabase 已新增 must_visit 欄位)"); 
                } finally { 
                    isSyncing.value = false; // ✨ 確保按鈕一定會停止旋轉
                }
            };

            watch([itineraryData, expenses, shoppingList, mustVisitList], () => {
                localStorage.setItem('sakura_v22_stable', JSON.stringify({ i: itineraryData.value, s: shoppingList.value, e: expenses.value, m: mustVisitList.value }));
            }, { deep: true });

            const showShoppingModal = ref(false); const isEditShopping = ref(false); const editShoppingIndex = ref(null);
            const newShoppingItem = ref({ name: '', image: null }); const fileInput = ref(null);

            return { 
                user, isGuest, isSyncing, isProcessingImage, currentTab, tabs: [{ id: 'itinerary', icon: 'fa-solid fa-map-location-dot' }, { id: 'info', icon: 'fa-solid fa-circle-info' }, { id: 'mustvisit', icon: 'fa-solid fa-store' }, { id: 'shopping', icon: 'fa-solid fa-basket-shopping' }, { id: 'expenses', icon: 'fa-solid fa-coins' }], dates: ref([{ date: '5/6', weekday: 'WED' }, { date: '5/7', weekday: 'THU' }, { date: '5/8', weekday: 'FRI' }, { date: '5/9', weekday: 'SAT' }, { date: '5/10', weekday: 'SUN' }, { date: '5/11', weekday: 'MON' }, { date: '5/12', weekday: 'TUE' }]), selectedDateIndex, itineraryData, shoppingList, expenses, mustVisitList, hotels, jpyInput, galleryList, galleryIndex,
                isAdmin: computed(() => user.value && ["99aca807-d86a-4566-bcaf-9129834fb965"].includes(user.value.id)),
                currentItinerary: computed(() => itineraryData.value[selectedDateIndex.value] || []),
                totalJPY: computed(()=>expenses.value.reduce((s,e)=>s+(Number(e.amount)||0),0)), totalTWD: computed(()=>Math.round(expenses.value.reduce((s,e)=>s+(Number(e.amount)||0),0)*0.215)),
                showShoppingModal, isEditShopping, newShoppingItem, fileInput,
                login: () => supabase.auth.signInWithOAuth({ provider: 'google' }),
                logout: async () => { await supabase.auth.signOut(); user.value = null; },
                forceSync,
                openEditShoppingModal: (item, idx) => { isEditShopping.value = true; editShoppingIndex.value = idx; newShoppingItem.value = JSON.parse(JSON.stringify(item)); showShoppingModal.value = true; },
                saveShoppingItem: () => { if(!newShoppingItem.value.name) return; if(isEditShopping.value) shoppingList.value[editShoppingIndex.value] = {...newShoppingItem.value}; else shoppingList.value.unshift({...newShoppingItem.value}); showShoppingModal.value = false; },
                removeShoppingItem: (idx) => shoppingList.value.splice(idx,1),
                triggerFileInput: () => fileInput.value.click(),
                handleImageUpload: async (e) => { isProcessingImage.value = true; newShoppingItem.value.image = await compressImage(e.target.files[0]); isProcessingImage.value = false; },
                openGallery: (imgs) => { if(imgs && imgs[0]) { galleryList.value = imgs; galleryIndex.value = 0; } },
                openMap: (q) => { if(q) window.open('https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(q), '_blank'); },
                formatNumber: (n) => n?.toLocaleString() || '0',
                getCategoryIcon: (cat) => ({ sightseeing: 'fa-solid fa-camera', flight: 'fa-solid fa-plane', food: 'fa-solid fa-utensils', accommodation: 'fa-solid fa-bed', transport: 'fa-solid fa-bus' }[cat] || 'fa-solid fa-star'),
                handleAddClick: () => { if(currentTab.value === 'shopping') { isEditShopping.value = false; newShoppingItem.value = { name: '', image: null }; showShoppingModal.value = true; } },
                exportNewHtml: () => { /* 注入 v22 代碼並下載 */ }
            };
        }
    }).mount('#app');
</script>
</body>
</html>
